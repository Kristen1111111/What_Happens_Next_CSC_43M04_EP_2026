# @package _global_
# Strong VL-JEPA experiment. Important: _global_ makes these values override
# cfg.model / cfg.training / cfg.dataset instead of creating cfg.experiment.*.

model:
  name: vl_jepa_video
  num_classes: ${num_classes}
  pretrained: true
  x_encoder_name: vit_base_patch16_224
  freeze_x_encoder: false
  predictor_dim: 1024
  target_dim: 1024
  predictor_depth: 6
  num_heads: 16
  num_query_tokens: 8
  dropout: 0.30
  logit_scale_init: 10.0
  drop_path_rate: 0.10
  temporal_mask_prob: 0.10
  head_hidden_mult: 1.5

training:
  device: cuda
  data_parallel: true
  compile: false
  amp: true
  tf32: true
  cudnn_benchmark: true
  batch_size: 4
  eval_batch_size: 8
  grad_accum_steps: 4
  epochs: 100
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4
  drop_last: true
  optimizer: adamw
  lr: 0.0001
  weight_decay: 0.05
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-08
  scheduler: cosine_warmup
  warmup_epochs: 8
  min_lr: 1.0e-06
  max_grad_norm: 1.0
  checkpoint_path: ${hydra:runtime.cwd}/checkpoints/vl_jepa_video_strong_best.pt
  label_smoothing: 0.1
  class_weighted_loss: true
  balanced_sampler: true
  ema: true
  ema_decay: 0.999
  validate_ema: true
  early_stopping_patience: 25
  use_augmentation: true
  aug_temporal_jitter: 0.45
  aug_frame_drop: 0.2
  aug_erasing: 0.5
  aug_mixup: 0.35
  aug_mixup_alpha: 0.4

dataset:
  num_frames: 16
  val_ratio: 0.2
  seed: 42
  train_labels_csv: csv/train_video_labels.csv
  val_labels_csv: csv/val_video_labels.csv
  tta_temporal_views: 5
