name: vl_jepa_video
num_classes: 50
pretrained: true

# X-Encoder. Good default for 11-16GB GPUs.
x_encoder_name: vit_small_patch16_224
freeze_x_encoder: false

# JEPA-style predictor / target embedding space.
predictor_dim: 512
target_dim: 512
predictor_depth: 4
num_heads: 8
num_query_tokens: 4
dropout: 0.20
logit_scale_init: 10.0
