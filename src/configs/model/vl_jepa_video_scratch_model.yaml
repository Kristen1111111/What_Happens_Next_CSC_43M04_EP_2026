# Model config: VL-JEPA-inspired video classifier FROM SCRATCH.
# Important: name stays 'vl_jepa_video' because train.py dispatches on cfg.model.name.
name: vl_jepa_video
num_classes: 50
pretrained: false

# X-Encoder architecture created by timm, but with random initialization.
# No ImageNet / external pretrained weights are loaded.
x_encoder_name: vit_small_patch16_224
freeze_x_encoder: false
img_size: 224

# JEPA-style predictor / target embedding space.
predictor_dim: 512
target_dim: 512
predictor_depth: 4
num_heads: 8
num_query_tokens: 4
dropout: 0.15
logit_scale_init: 10.0
